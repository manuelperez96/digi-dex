<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Buscador de Digimons" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/page/home/home.css" />
    <title>digiDex</title>
  </head>
  <body data-page="home">
    <header>
      <img
        src="./assets/logo/transparent-degive-logo.png"
        alt="Logo trasnsparente de un Degivice"
      />
      <h1>Digidex</h1>
    </header>

    <main>
      <section class="hero">
        <img
          src="./assets/logo/digivice-full-logo.png"
          alt="Logo de Digimon: Digital Monster"
        />
      </section>

      <section class="digimon-list">
        <div class="searcher">
          <input
            class="searcher-bar"
            type="text"
            placeholder="Buscar por nombre: Agumon"
          />
          <button type="button" class="searcher-button">
            <object data="./assets/icons/search.svg"></object>
          </button>
        </div>
        <div class="grided-list"></div>
      </section>

      <div style="height: 100vh;"></div>
    </main>
  </body>
</html>
