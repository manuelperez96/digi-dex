<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Buscador de Digimons" />
    <link rel="stylesheet" href="./css/main.css" />
    <link rel="stylesheet" href="./css/page/home/home.css" />
    <script type="module" src="./javascript/main.js"></script>
    <title>digiDex</title>
  </head>
  <body data-page="home">
    <header>
      <img
        src="./assets/logo/transparent-degive-logo.png"
        alt="Logo trasnsparente de un Degivice"
      />
      <h1>Digidex</h1>
    </header>

    <main>
      <section class="hero">
        <img
          src="./assets/logo/digivice-full-logo.png"
          alt="Logo de Digimon: Digital Monster"
        />
      </section>

      <section class="digimon-list">
        <div class="searcher">
          <input
            id="search-bar"
            class="searcher-bar"
            type="text"
            placeholder="Buscar por nombre: Agumon"
          />
          <button id="search-button" class="searcher-button" type="button">
            <svg
              width="38"
              height="40"
              viewBox="0 0 38 40"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M31.0333 35L21.0583 24.5C20.2667 25.1667 19.3563 25.6944 18.3271 26.0833C17.2979 26.4722 16.2028 26.6667 15.0417 26.6667C12.1653 26.6667 9.7309 25.6181 7.73854 23.5208C5.74618 21.4236 4.75 18.8611 4.75 15.8333C4.75 12.8056 5.74618 10.2431 7.73854 8.14583C9.7309 6.04861 12.1653 5 15.0417 5C17.9181 5 20.3524 6.04861 22.3448 8.14583C24.3372 10.2431 25.3333 12.8056 25.3333 15.8333C25.3333 17.0556 25.1486 18.2083 24.7792 19.2917C24.4097 20.375 23.9083 21.3333 23.275 22.1667L33.25 32.6667L31.0333 35ZM15.0417 23.3333C17.0208 23.3333 18.7031 22.6042 20.0885 21.1458C21.474 19.6875 22.1667 17.9167 22.1667 15.8333C22.1667 13.75 21.474 11.9792 20.0885 10.5208C18.7031 9.0625 17.0208 8.33333 15.0417 8.33333C13.0625 8.33333 11.3802 9.0625 9.99479 10.5208C8.60938 11.9792 7.91667 13.75 7.91667 15.8333C7.91667 17.9167 8.60938 19.6875 9.99479 21.1458C11.3802 22.6042 13.0625 23.3333 15.0417 23.3333Z"
                fill="#FEF7FF"
              />
            </svg>
          </button>
        </div>
        <div id="loader" class="loader hide" ></div>
        <h2 id="error-text" class="hide" >Uppss... Parece que algo ha fallado</h2>
        <div id="hideable-content" class="hide">
          <div id="grided-list" class="grided-list"></div>
        </div>
      </section>
    </main>
  
  </body>
</html>
